<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="edit_add.html">
    <title>Editar</title>
</head>
<body>
    <h1>Editar gasto</h1>
    <form action="{{ url_for('editar', id=gasto.id) }}" method="POST">
        <div class="inputsCont">
            Valor: <input type="number" name="valorGasto" id="valorGasto" value="{{gasto.valor}}" required>
            Data: <input type="date" name="dataGasto" id="dataGasto" value="{{gasto.data}}" required>
            <button type="button" onclick="setToday()">Hoje</button>
            Descrição: <input type="text" name="descGasto" id="descGasto" value="{{gasto.descricao}}">
            Categoria existente:
            <select name="categoriaSelecionada" id="categoriaSelecionada" onchange="toggleNovaCategoria()">
                <option value="">Selecione uma categoria</option>
                {% for categoria in categorias %}
                    <option value="{{ categoria }}" {% if categoria == gasto.categoria %}selected{% endif %}>{{ categoria }}</option>
                {% endfor %}
                <option value="nova">Criar nova categoria</option>
            </select>
            <div id="novaCategoriaContainer" style="display: none;">
                Nova categoria: <input type="text" name="novaCategoria" id="novaCategoria">
            </div>
        </div>
        <input type="submit" value="Editar">
    </form>

    <form action="{{ url_for('deletar_categoria') }}" method="POST" onsubmit="return confirm('Deseja apagar esta categoria de todos os gastos?');">
        <input type="hidden" name="categoriaParaApagar" id="categoriaParaApagar" value="">
        <input type="hidden" name="editarId" value="{{ gasto.id }}">
        <button type="submit" id="btnApagarCategoria" disabled>Apagar categoria</button>
    </form>
    <script>
        function setToday() {
            const today = new Date().toISOString().slice(0, 10);
            document.getElementById('dataGasto').value = today;
        }
        function toggleNovaCategoria() {
            const select = document.getElementById('categoriaSelecionada');
            const novaContainer = document.getElementById('novaCategoriaContainer');
            const apagarCategoria = document.getElementById('btnApagarCategoria');
            const categoriaParaApagar = document.getElementById('categoriaParaApagar');
            const selecionada = select.value;
            novaContainer.style.display = selecionada === 'nova' ? 'block' : 'none';
            if (selecionada && selecionada !== 'nova') {
                apagarCategoria.disabled = false;
                categoriaParaApagar.value = selecionada;
            } else {
                apagarCategoria.disabled = true;
                categoriaParaApagar.value = '';
            }
        }
        window.addEventListener('DOMContentLoaded', toggleNovaCategoria);
    </script>
</body>
</html>
