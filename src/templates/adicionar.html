<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar</title>
</head>
<body>
    <h1>Adicionar gasto</h1>
    <form action="" method="POST">
        Valor: <input type="number" name="valorGasto" id="valorGasto" required><br><br>

        Data: <input type="date" name="dataGasto" id="dataGasto" required>
        <button type="button" onclick="setToday()">Hoje</button><br><br>

        Descrição: <input type="text" name="descGasto" id="descGasto"><br><br>

        Categoria:
        <select name="categoriaSelecionada" id="categoriaSelecionada" onchange="toggleNovaCategoria()">
            <option value="">Selecione uma categoria</option> 

            {% for categoria in categorias %}
                <option value="{{ categoria }}">{{ categoria }}</option> 
            {% endfor %}

            <option value="nova">Criar nova categoria</option>
        </select><br><br>
        <div id="novaCategoriaContainer" style="display: none;">
            Nova categoria: <input type="text" name="novaCategoria" id="novaCategoria"> <br><br>
        </div>

        <input type="submit" value="Registrar">
    </form>

    <script>
        function setToday() {
            const today = new Date().toISOString().slice(0, 10);
            document.getElementById('dataGasto').value = today;
        }
        function toggleNovaCategoria() {
            const select = document.getElementById('categoriaSelecionada');
            const novaContainer = document.getElementById('novaCategoriaContainer');
            novaContainer.style.display = select.value === 'nova' ? 'block' : 'none';
        }
    </script>
</body>
</html>
